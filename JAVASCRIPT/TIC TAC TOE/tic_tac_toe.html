<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="tic_tac_toe.css">
</head>
<body>
    <nav>
        <ul>
            TicTacToe.org
        </ul>
    </nav>
    <div class="container">

        <span class="line"></span>
        <div class="game-container">
            <div class="cell bt-0 bl-0" cellIndex="0"><span class="cell-text"></span></div>
            <div class="cell bt-0" cellIndex="1"><span class="cell-text"></span></div>
            <div class="cell bt-0 br-0" cellIndex="2"><span class="cell-text"></span></div>
            <div class="cell bl-0" cellIndex="3"><span class="cell-text"></span></div>
            <div class="cell " cellIndex="4" ><span class="cell-text"></span></div>
            <div class="cell br-0" cellIndex="5"><span class="cell-text"></span></div>
            <div class="cell bb-0 bl-0" cellIndex="6"><span class="cell-text"></span></div>
            <div class="cell bb-0" cellIndex="7"><span class="cell-text"></span></div>
            <div class="cell bb-0 br-0" cellIndex="8"><span class="cell-text"></span></div>
        </div>
        <div id="status-box">
            <div id="status-text">Your's Turn</div>
            <button id="reset-button">reset</button>
        </div>

    </div>
    <script src="tic_tac_toe.js"></script>
</body>
</html>
