<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEET MATRIC</title>
    <link rel="stylesheet" href="leet.css">
</head>
<body>
    <div class="container">
        <h1 id="heading1">LEET CODE MATRIC</h1>
        <div class="user-field">
            <input type="text" placeholder="Enter The Name" autocomplete="off" id="user-text">
            <button id="user-submit">SEARCH</button>
        </div>
        <div class="stats-field">
            <div class="easy-problems stats">
                <span id="easy">easy</span>
            </div>
            <div class="medium-problems stats">
                <span id="medium">medium</span>
            </div>
            <div class="hard-problems stats">
                <span id="hard">hard</span>
            </div>
        </div>
        <div class="stats-cards">

            
        </div>

    </div>
    

    <script src="leet.js"></script>
</body>
</html>
